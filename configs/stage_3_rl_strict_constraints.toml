run_type = "staged_learning"
device = "cuda:0"
tb_logdir = "runs/tb/stage_3_strict"
json_out_config = "runs/stage_3_strict/config.json"

[parameters]
prior_file = "priors/reinvent.prior"
agent_file = "runs/stage_2_7piu/agent.chkpt"
summary_csv_prefix = "runs/stage_3_strict/progress"
batch_size = 128
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128.0
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.5
minsimilarity = 0.35

[[stage]]
max_score = 1.0
max_steps = 100
chkpt_file = "runs/stage_3_strict/agent.chkpt"

[stage.termination]
type = "simple"

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
type = "custom_product"
name = "mc4r_docking_vina"

[stage.scoring.component.endpoint]
name = "mc4r_docking_vina"
weight = 1.2
params = { pdb_ids = ["7PIU", "7AUE", "7PIV"], target_kcal = -9.5, require_ca_coordination = true, require_glu100_hbond = true, minimum_structures = 3 }

[[stage.scoring.component]]
type = "custom_product"
name = "calcium_coordination"

[stage.scoring.component.endpoint]
name = "calcium_coordination"
weight = 1.5
params = { pdb_id = "7PIU", require_both = true }

[[stage.scoring.component]]
type = "custom_product"
name = "selectivity"

[stage.scoring.component.endpoint]
name = "melanocortin_selectivity"
weight = 1.0
params = { panel_path = "artifacts/qsar_panel.joblib", min_pki_mc4r = 7.5, min_selectivity_mc1r = 2.5 }
