run_type = "staged_learning"
device = "cuda:0"
tb_logdir = "runs/tb/stage_2_7piv"
json_out_config = "runs/stage_2_7piv/config.json"

[parameters]
prior_file = "priors/reinvent.prior"
agent_file = "runs/stage_1_tl/focused.prior"
summary_csv_prefix = "runs/stage_2_7piv/progress"
use_checkpoint = false
purge_memories = false
smiles_file = ""
batch_size = 128
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128.0
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4
minsimilarity = 0.4

[[stage]]
max_score = 1.0
max_steps = 100
chkpt_file = "runs/stage_2_7piv/agent.chkpt"

[stage.termination]
type = "simple"

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
type = "custom_product"
name = "selectivity"

[stage.scoring.component.endpoint]
name = "melanocortin_selectivity"
weight = 1.0
params = { panel_path = "artifacts/qsar_panel.joblib", min_pki_mc4r = 7.0, min_selectivity_mc1r = 2.0 }

[[stage.scoring.component]]
type = "custom_product"
name = "structure_based"

[stage.scoring.component.endpoint]
name = "mc4r_docking_vina"
weight = 1.0
params = { pdb_ids = ["7PIV"], target_kcal = -9.0, sigmoid_slope = 0.5, exhaustiveness = 16 }

[[stage.scoring.component]]
type = "custom_product"
name = "novelty"

[stage.scoring.component.endpoint]
name = "chemotype_novelty"
weight = 0.5

[stage.scoring.component.endpoint_b]
name = "vendor_novelty"
weight = 0.5
params = { max_tanimoto = 0.6 }

[[stage.scoring.component]]
type = "custom_product"
name = "ca_coordination"

[stage.scoring.component.endpoint]
name = "calcium_coordination"
weight = 1.0
params = { pdb_id = "7PIV" }

[[stage.scoring.component]]
type = "custom_product"
name = "synthesis"

[stage.scoring.component.endpoint]
name = "ra_score"
weight = 1.0

[[stage.scoring.component]]
type = "QED"
name = "qed"
weight = 0.25

[[stage.scoring.component]]
type = "MolecularWeight"
name = "mw"
weight = 0.1

[stage.scoring.component.transformation]
type = "double_sigmoid"
high = 500.0
low = 200.0
coef_div = 60.0
coef_si = 20.0
coef_se = 20.0
